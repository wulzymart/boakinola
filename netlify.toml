[build]
  command = "npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "24"

# Friendly URLs and SPA-style fallback for non-prerendered paths
[[redirects]]
  from = "/services/taxation"
  to = "/services/taxation/index.html"
  status = 200

[[redirects]]
  from = "/services/value-added-tax"
  to = "/services/value-added-tax/index.html"
  status = 200

[[redirects]]
  from = "/services/investigation"
  to = "/services/investigation/index.html"
  status = 200

[[redirects]]
  from = "/services/reconciliation"
  to = "/services/reconciliation/index.html"
  status = 200

[[redirects]]
  from = "/services/asset-verification"
  to = "/services/asset-verification/index.html"
  status = 200

[[redirects]]
  from = "/services/training"
  to = "/services/training/index.html"
  status = 200

[[redirects]]
  from = "/services/agricultural-extension"
  to = "/services/agricultural-extension/index.html"
  status = 200

[[redirects]]
  from = "/services/company-formation"
  to = "/services/company-formation/index.html"
  status = 200

[[redirects]]
  from = "/services/receivership-liquidation"
  to = "/services/receivership-liquidation/index.html"
  status = 200

[[redirects]]
  from = "/services/management-consultancy"
